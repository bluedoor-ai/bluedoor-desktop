name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build and publish (macOS)
        run: npm run publish:mac
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Code signing
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          # Notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  build-windows:
    runs-on: windows-latest
    env:
      ESIGNER_INSTALL_DIR: C:\Users\runneradmin\eSignerCKA
      ESIGNER_MASTER_KEY_FILE: C:\Users\runneradmin\eSignerCKA\master.key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install eSigner CKA
        shell: pwsh
        run: |
          $zipPath = Join-Path $env:RUNNER_TEMP 'eSignerCKA.zip'
          $extractDir = Join-Path $env:RUNNER_TEMP 'eSignerCKA'
          Invoke-WebRequest -Uri 'https://github.com/SSLcom/eSignerCKA/releases/download/v1.0.6/SSL.COM-eSigner-CKA_1.0.6.zip' -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force
          $installer = Get-ChildItem -Path $extractDir -Filter '*.exe' -Recurse | Select-Object -First 1
          if (-not $installer) {
            throw 'Unable to find the eSigner CKA installer in the downloaded archive.'
          }
          New-Item -ItemType Directory -Force -Path $env:ESIGNER_INSTALL_DIR | Out-Null
          & $installer.FullName /CURRENTUSER /VERYSILENT /SUPPRESSMSGBOXES /DIR="$env:ESIGNER_INSTALL_DIR" | Out-Null

      - name: Configure eSigner CKA
        shell: pwsh
        run: |
          & "$env:ESIGNER_INSTALL_DIR\eSignerCKATool.exe" config `
            -mode "${{ secrets.SSL_COM_MODE }}" `
            -user "${{ secrets.SSL_COM_USERNAME }}" `
            -pass "${{ secrets.SSL_COM_PASSWORD }}" `
            -totp "${{ secrets.SSL_COM_TOTP_SECRET }}" `
            -key "$env:ESIGNER_MASTER_KEY_FILE" `
            -r

      - name: Load Windows code signing certificate
        shell: pwsh
        run: |
          & "$env:ESIGNER_INSTALL_DIR\eSignerCKATool.exe" unload
          & "$env:ESIGNER_INSTALL_DIR\eSignerCKATool.exe" load
          $codeSigningCert = Get-ChildItem Cert:\CurrentUser\My -CodeSigningCert | Select-Object -First 1
          if (-not $codeSigningCert) {
            throw 'No code signing certificate was loaded into Cert:\\CurrentUser\\My.'
          }
          $publisherName = $codeSigningCert.GetNameInfo([System.Security.Cryptography.X509Certificates.X509NameType]::SimpleName, $false)
          "WIN_CERTIFICATE_SHA1=$($codeSigningCert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WIN_PUBLISHER_NAME=$publisherName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        run: npm install

      - name: Bundle Node.js for Windows
        run: node scripts/bundle-node-win.js

      - name: Build and publish (Windows)
        run: npm run publish:win
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload eSigner CKA logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: esigner-cka-logs
          path: C:\Users\runneradmin\AppData\Roaming\eSignerCKA\KSP
          if-no-files-found: ignore

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build and publish (Linux)
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
