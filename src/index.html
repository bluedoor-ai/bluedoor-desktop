<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bluedoor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
    }

    .titlebar {
      -webkit-app-region: drag;
      height: 38px;
      background: #0a0a0a;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
    }

    #terminal-container {
      position: absolute;
      top: 38px;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 4px 8px 8px 8px;
    }

    #exit-overlay {
      display: none;
      position: absolute;
      top: 38px;
      left: 0;
      right: 0;
      bottom: 0;
      background: #0a0a0a;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 16px;
      z-index: 5;
    }

    #exit-overlay.visible { display: flex; }

    #exit-overlay button {
      background: transparent;
      color: #888;
      border: 1px solid #333;
      padding: 10px 32px;
      border-radius: 8px;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.3px;
      -webkit-app-region: no-drag;
      transition: all 0.15s ease;
    }

    #exit-overlay button:hover {
      color: #ccc;
      border-color: #555;
    }

    .xterm { height: 100%; }

    /* Hide xterm scrollbar — bluedoor manages its own scrolling */
    .xterm-viewport::-webkit-scrollbar { display: none; }
    .xterm-viewport { scrollbar-width: none; }

    /* Fill any gap between terminal grid and container edge */
    .xterm-viewport, .xterm-screen { background: #0a0a0a !important; }
  </style>
</head>
<body>
  <div class="titlebar"></div>
  <div id="terminal-container"></div>
  <div id="exit-overlay">
    <button id="restart-btn">Start</button>
  </div>

  <script>
    const { Terminal } = require('@xterm/xterm');
    const { FitAddon } = require('@xterm/addon-fit');

    // Load xterm CSS
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = require.resolve('@xterm/xterm/css/xterm.css');
    document.head.appendChild(link);

    const container = document.getElementById('terminal-container');
    const exitOverlay = document.getElementById('exit-overlay');
    const restartBtn = document.getElementById('restart-btn');

    const term = new Terminal({
      fontFamily: "'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', Menlo, monospace",
      fontSize: 16,
      lineHeight: 1.2,
      cursorBlink: false,
      cursorStyle: 'bar',
      theme: {
        background: '#0a0a0a',
        foreground: '#e0e0e0',
        cursor: '#e0e0e0',
        selectionBackground: '#264f78',
        black: '#1a1a1a',
        red: '#f87171',
        green: '#4ade80',
        yellow: '#fbbf24',
        blue: '#60a5fa',
        magenta: '#c084fc',
        cyan: '#22d3ee',
        white: '#e0e0e0',
        brightBlack: '#666666',
        brightRed: '#fca5a5',
        brightGreen: '#86efac',
        brightYellow: '#fde68a',
        brightBlue: '#93c5fd',
        brightMagenta: '#d8b4fe',
        brightCyan: '#67e8f9',
        brightWhite: '#ffffff',
      },
      allowTransparency: false,
      scrollback: 5000,
    });

    const fitAddon = new FitAddon();
    term.loadAddon(fitAddon);
    term.open(container);
    fitAddon.fit();

    // Focus terminal immediately and on window activation
    term.focus();
    window.addEventListener('focus', () => term.focus());
    container.addEventListener('mousedown', () => setTimeout(() => term.focus(), 0));

    // Forward keystrokes to PTY
    term.onData((data) => window.terminal.sendInput(data));

    // Ctrl+V paste support
    // Intercept at the DOM level before xterm.js sees it, to avoid double-paste.
    term.element.addEventListener('keydown', (ev) => {
      if ((ev.ctrlKey || ev.metaKey) && ev.key === 'v') {
        ev.preventDefault();
        ev.stopPropagation();
        navigator.clipboard.readText().then((text) => {
          if (text) window.terminal.sendInput(text);
        }).catch(() => {});
      }
    }, true); // capture phase — fires before xterm's handler

    // Mouse wheel scroll: send SGR mouse sequences directly to the PTY.
    // The CLI enables mouse reporting and handles scroll internally via Ink.
    // On Windows ConPTY, xterm.js mouse reporting may not work because ConPTY
    // intercepts/drops mouse escape sequences. This handler bypasses that by
    // converting DOM wheel events into SGR mouse sequences manually.
    // Accumulate fractional scroll for smooth, consistent 2-line scrolling
    // Smooth scrolling: send 1 SGR event per small delta for fine-grained,
    // responsive scrolling. The CLI scrolls 1 line per event.
    let scrollAccum = 0;
    const PX_PER_LINE = 40; // pixels of wheel delta per scroll event

    container.addEventListener('wheel', (ev) => {
      ev.preventDefault();
      scrollAccum += ev.deltaY;
      const lines = Math.trunc(scrollAccum / PX_PER_LINE);
      if (lines === 0) return;
      scrollAccum -= lines * PX_PER_LINE;

      const button = lines > 0 ? 65 : 64; // 65=down, 64=up
      const count = Math.abs(lines);
      for (let i = 0; i < count; i++) {
        window.terminal.sendInput(`\x1b[<${button};1;1M`);
      }
    }, { passive: false });

    // --- Synchronized output bridge ---
    // Ink wraps each render cycle in BSU/ESU (DEC mode 2026) markers.
    // xterm.js v5.x doesn't support mode 2026, so it renders the intermediate
    // "erased" state between clear and redraw, causing visible flicker.
    //
    // On Windows ConPTY, BSU/ESU markers pass through but the content often
    // arrives in separate chunks AFTER the ESU. This means the "clear screen"
    // is inside BSU/ESU (batched) but the new content arrives outside (unbatched),
    // causing a flash of blank screen.
    //
    // Solution: two-layer buffering.
    //  1. BSU/ESU bridge: strip markers, buffer content between them.
    //  2. Frame coalescing: batch ALL writes into ~8ms frames (half a 60fps tick)
    //     so rapid clear+redraw sequences get combined into a single render.
    const BSU = '\x1b[?2026h'; // Begin Synchronized Update
    const ESU = '\x1b[?2026l'; // End Synchronized Update

    let syncBuffer = '';
    let inSync = false;

    // Frame coalescing: accumulate writes and flush after a quiet period.
    // Uses a short delay (2ms) for normal output to keep typing responsive,
    // but extends to 50ms when a BSU render cycle is detected, since Ink's
    // clear+redraw chunks can arrive with gaps up to ~40ms on ConPTY.
    let pendingWrite = '';
    let flushTimer = null;
    let recentBSU = false; // true when we've seen a BSU recently
    let bsuCooldown = null;

    function coalescedWrite(data) {
      pendingWrite += data;
      if (flushTimer !== null) clearTimeout(flushTimer);
      const delay = recentBSU ? 50 : 2;
      flushTimer = setTimeout(() => {
        flushTimer = null;
        if (pendingWrite.length > 0) {
          term.write(pendingWrite);
          pendingWrite = '';
        }
      }, delay);
    }

    function processData(data) {
      let remaining = data;

      while (remaining.length > 0) {
        if (!inSync) {
          const bsuIndex = remaining.indexOf(BSU);
          if (bsuIndex === -1) {
            coalescedWrite(remaining);
            remaining = '';
          } else {
            if (bsuIndex > 0) {
              coalescedWrite(remaining.substring(0, bsuIndex));
            }
            inSync = true;
            syncBuffer = '';
            remaining = remaining.substring(bsuIndex + BSU.length);
            // Mark that a render cycle is active — extend coalescing window
            recentBSU = true;
            if (bsuCooldown) clearTimeout(bsuCooldown);
            bsuCooldown = setTimeout(() => { recentBSU = false; }, 100);
          }
        } else {
          const esuIndex = remaining.indexOf(ESU);
          if (esuIndex === -1) {
            syncBuffer += remaining;
            remaining = '';
          } else {
            syncBuffer += remaining.substring(0, esuIndex);
            coalescedWrite(syncBuffer); // deliver full render cycle to coalescing buffer
            syncBuffer = '';
            inSync = false;
            remaining = remaining.substring(esuIndex + ESU.length);
          }
        }
      }
    }

    // Safety: flush if ESU never arrives (e.g. process crash mid-render)
    setInterval(() => {
      if (inSync && syncBuffer.length > 0) {
        coalescedWrite(syncBuffer);
        syncBuffer = '';
        inSync = false;
      }
    }, 1000);

    // Receive PTY output through the sync bridge
    window.terminal.onData((data) => processData(data));

    // Handle CLI exit
    window.terminal.onExit((exitCode) => {
      exitOverlay.classList.add('visible');
    });

    // Restart button
    restartBtn.addEventListener('click', () => {
      exitOverlay.classList.remove('visible');
      term.clear();
      term.reset();
      window.terminal.restart(term.cols, term.rows);
    });

    // Resize only on actual window resize — not ResizeObserver
    let lastCols = term.cols;
    let lastRows = term.rows;
    let resizeTimer = null;
    window.addEventListener('resize', () => {
      if (resizeTimer) clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        fitAddon.fit();
        if (term.cols !== lastCols || term.rows !== lastRows) {
          lastCols = term.cols;
          lastRows = term.rows;
          window.terminal.resize(term.cols, term.rows);
        }
      }, 100);
    });

    // Set platform class for CSS
    if (window.platform) {
      document.body.classList.add(`platform-${window.platform}`);
    }

    // Signal ready
    window.terminal.ready(term.cols, term.rows);
  </script>
</body>
</html>
